name: Build and Deploy Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # --- mdBook (guide) ---
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Rewrite API links for deployment
        run: |
          # doc-gen4 output lives at api/ relative to the mdBook root.
          # Rewrite ../Hale/ and ../../Hale/ links to relative api/Hale/ paths.
          # Order matters: longest match first to avoid partial replacement.
          find docs -name '*.md' -exec sed -i \
            -e 's|\.\./\.\./Hale/|../api/Hale/|g' \
            -e 's|\.\./Hale/|api/Hale/|g' \
            {} +

      - name: Build mdBook
        run: mdbook build docs

      # --- doc-gen4 (API reference) ---
      - name: Install OpenSSL
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - uses: leanprover/lean-action@v1

      - name: Generate doc-gen4 API docs
        run: lake build Hale:docs

      # --- Merge into single site ---
      - name: Assemble site
        run: |
          mkdir -p _site

          # Guide at root (landing page)
          # mdBook 0.5+ outputs directly to build-dir (no html/ subdir)
          cp -r .lake/build/guide/* _site/

          # API reference at /api/
          mkdir -p _site/api
          cp -r .lake/build/doc/* _site/api/

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
