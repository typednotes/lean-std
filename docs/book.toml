[book]
title = "Hale — Haskell's Web Ecosystem in Lean 4"
authors = ["Nicolas Grislain"]
language = "en"
src = "."

[build]
build-dir = "../.lake/build/guide"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/typednotes/hale"
edit-url-template = "https://github.com/typednotes/hale/edit/main/docs/{path}"
no-section-label = true
additional-css = ["theme/hale.css"]
